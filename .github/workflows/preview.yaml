name: workflow-preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: workflow-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-version:
    runs-on: ubuntu-latest
    outputs:
      preview_tag: ${{ steps.version.outputs.preview_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute preview version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          BRANCH_SLUG="${BRANCH_NAME//\//-}"
          FULL_SHA="$(git rev-parse HEAD)"
          PREVIEW_TAG="${BRANCH_SLUG}-${FULL_SHA}"

          echo "preview_tag=${PREVIEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Preview version: ${PREVIEW_TAG}"

      - name: Add summary
        run: |
          echo "### Preview version" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.version.outputs.preview_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview tag on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewTag = "${{ steps.version.outputs.preview_tag }}";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview version: \`${previewTag}\``
            });